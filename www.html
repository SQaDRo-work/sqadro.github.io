<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"> 
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body id="body">
  <section id="block-0">
    <div class="container text-center">
      <div class="row justify-content-center">
        <div class="col-sm-12">
          <audio id="player" src="assets/music.mp3" loop="loop"></audio>
          <div class="music-btn-block">
            <span id="play-music" class="music-btn music-btn-play" onclick="playMusic()"></span>
            <span id="pause-music" class="music-btn music-btn-pause" onclick="pauseMusic()"></span>
          </div>
          <p class="title title-name">Алексей</br>&</br>Ольга</p>
          <p class="title title-date">20.06.2026</p>
        </div>
      </div>
    </div>
  </section>
  <section id="block-1">
    <div class="container text-center">
      <div class="row justify-content-center">
        <div class="col-sm-12">
          <p class="title">Дорогие гости</p>
          <span class="text">Один день в этом году будет для нас особенным и мы хотим провести его в кругу самых близких и родных людей. Поэтому с большим удовольствием приглашаем вас на нашу свадьбу!</span>
        </div>
      </div>
    </div>
  </section>
</body>
</html>

<style>
  :root {
    --beige: #D2B1A4;
    --olive: #767A3C;
  }
  html {
    font-family: sans-serif;
    scroll-snap-type: mandatory;
    scroll-snap-points-y: repeat(100vh);
    scroll-snap-type: y mandatory;
    background-image: url(assets/background_layout.jpg);
  }
  #body {
    background-color: var(--color);
  }
  section {
    height: 100vh;
    scroll-snap-align: start;
    text-align: center;
    position: relative;
    background-repeat: no-repeat;
    background-position: center;
    background-size: 100% 100%;
    max-width: 680px;
    margin: 0 auto;
    mask-image: linear-gradient(to right, transparent, black 20%, black 80%, transparent);
  }
  .container {
    color: var(--olive);
    font-size: 18px;
    font-weight: 600;
    position: relative;
    z-index: 1;
  }
  .title {
    font-family: "Great Vibes", cursive;
    font-size: 60px;
  }


  #block-0 {
    margin-top: 40px;
  }
  #block-0 .container {
    min-height: 740px;
    height: 100vh;
  }
  #block-0 .title {
    font-size: 70px;
    line-height: 65px;
  }
  #block-0 .title.title-name {
    margin-top: 80px;
    margin-bottom: 5px;
  }
  .music-btn-block {
    margin-top: 40px;
  }
  .music-btn {
    background-repeat: no-repeat;
    background-size: 50px;
    width: 50px;
    height: 50px;
    display: inline-block;
    cursor: pointer;
  }
  .music-btn-play {
    background-image: url(assets/play.png);
  }
  .music-btn-pause {
    background-image: url(assets/pause.png);
  }
  #player:playing > .music-btn-block .music-btn-play {
    display: none;
  }
  #player:paused > .music-btn-block .music-btn-pause {
    display: none;
  }


  #block-1 {
    padding: 10rem 3rem;
  }
  #block-0 {
    background-image: url(assets/background_0.jpg);
  }
  #block-1 {
    background-image: url(assets/background_1.jpg);
  }
</style>

<script>
  window.onload = function() {
    document.getElementById("player").play();
  }

  function playMusic() {
    document.getElementById('player').play()
  }

  function pauseMusic() {
    document.getElementById('player').pause()
  }
</script>
